name: Mobile Android APK
on:
  workflow_dispatch:
  push:
    tags:
      - "android-*"
      - "v*"
    paths:
      - "core/**"
      - "mobile/**"
      - "build-idai-field-android-apk.ps1"
      - "install-idai-field-android-apk.ps1"
      - "run-idai-field-tablet-ko.ps1"
      - ".github/workflows/mobile.yml"
  pull_request:
    paths:
      - "core/**"
      - "mobile/**"
      - "build-idai-field-android-apk.ps1"
      - "install-idai-field-android-apk.ps1"
      - "run-idai-field-tablet-ko.ps1"
      - ".github/workflows/mobile.yml"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            core/package-lock.json
            mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Install core dependencies
        run: npm ci
        working-directory: core

      - name: Build core
        run: npm run build
        working-directory: core

      - name: Install mobile dependencies
        run: npm ci --legacy-peer-deps
        working-directory: mobile

      - name: Build release APK
        run: ./gradlew --no-daemon app:assembleRelease
        working-directory: mobile/android

      - name: Copy APK
        run: |
          mkdir -p dist/android
          cp mobile/android/app/build/outputs/apk/release/app-release.apk dist/android/idai-field-mobile-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: idai-field-mobile-android-apk
          path: dist/android/idai-field-mobile-release.apk

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/idai-field-mobile-release.apk
