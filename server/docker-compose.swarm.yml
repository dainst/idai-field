version: "3.5"

services:
  couchdb:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=${COUCHDB_ADMIN_NAME}
      - COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}
    volumes:
      - /mnt/field_hub/db:/opt/couchdb/data
    networks:
      - web
      - default
    deploy:
      labels:
        - "traefik.docker.network=web"
        - "traefik.enable=true"
        - "traefik.frontend.rule=Host:db.${HOST}"
        - "traefik.port=5984"

  app:
    image: "ghcr.io/dainst/field_hub:${FIELD_HUB_VERSION}"
    environment:
      - HOST
      - SECRET_KEY_BASE
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_ADMIN_NAME=${COUCHDB_ADMIN_NAME}
      - COUCHDB_ADMIN_PASSWORD=${COUCHDB_ADMIN_PASSWORD}
      - COUCHDB_USER_NAME=${COUCHDB_USER_NAME}
      - COUCHDB_USER_PASSWORD=${COUCHDB_USER_PASSWORD}
    depends_on:
      - "couchdb"
    volumes:
      - /mnt/field_hub/files:/files
    networks:
      - web
      - default
    deploy:
      labels:
        - "traefik.docker.network=web"
        - "traefik.enable=true"
        - "traefik.frontend.rule=Host:${HOST}"
        - "traefik.port=4000"

networks:
  web:
    external: true
