services:
  couchdb:
    image: couchdb:3.3.2
    ports:
      - "5984:5984"
    environment:
      - "COUCHDB_USER=${COUCHDB_ADMIN_USER}"
      - "COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}"
  couchdb_test:
    image: couchdb:3.3.2
    ports:
      - "5983:5984"
    environment:
      - "COUCHDB_USER=${COUCHDB_ADMIN_USER}"
      - "COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}"
