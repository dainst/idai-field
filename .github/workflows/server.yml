name: Server
on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
jobs:
  Tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: 27.0
          elixir-version: 1.18.0
      - name: Start CouchDB
        run: docker compose -f docker-compose.yml --env-file .env_template up -d
        working-directory: server
      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: server/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install Field Hub dependencies and run setup
        run: mix setup
        working-directory: server
      - name: Audit Field Hub dependencies
        run: mix deps.audit
        working-directory: server
      - name: Run Field Hub tests
        run: mix test
        working-directory: server
