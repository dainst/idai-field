
<div *ngIf="contextMenu && areOptionsAvailable()"
     id="context-menu"
     class="dropdown-menu show"
     [class.orientation-top]="contextMenu.orientation === 'top'"
     [class.orientation-bottom]="contextMenu.orientation === 'bottom'"
     [style.left]="contextMenu.position.x + 'px'"
     [style.top]="contextMenu.position.y + 'px'"
     [style.bottom]="getBottomPosition(contextMenu.position.y) + 'px'">
    <div id="context-menu-view-button" class="dropdown-item" (click)="selectAction('view')">
        <span class="mdi mdi-application-export mdi-flip-h"></span>
        <span class="dropdown-entry-label" i18n="@@resources.showInContext.tooltip">Im Kontext anzeigen</span>
    </div>
    <div id="context-menu-edit-button" class="dropdown-item" (click)="selectAction('edit')">
        <span class="mdi mdi-pencil"></span>
        <span class="dropdown-entry-label" i18n="@@resources.contextMenu.edit">Bearbeiten</span>
    </div>
</div>
